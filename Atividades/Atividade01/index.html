<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cadastre seu Personagem de Anime</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div id="character-form">
            <h2>Cadastre o seu personagem de anime aqui!</h2>
            <label for="input-name">Nome:</label>
            <input type="text" id="input-name">
            <label for="input-age">Idade:</label>
            <input type="number" id="input-age">
            <label for="input-powers">Poderes:</label>
            <input type="text" id="input-powers">
            <label for="input-rivals">Rivais: </label>
            <input type="text" id="input-rivals">
            <label for="input-personality">Personalidade: </label>
            <input type="text" id="input-personality">
            <label for="input- catchphrase">Frase de efeito: </label>
            <input type="text" id="input-catchphrase">
            <label for="input-history">História: </label>
            <input type="text" id="input-history">
        </div>
        <div id="image-section">
            <label for="input-image">Imagem do personagem: </label>
            <input type="file" id="input-image" accept="image/png, image/jpeg">
        </div>
    </main>
</body>
</html>
