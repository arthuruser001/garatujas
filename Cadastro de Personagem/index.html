<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastre seu personagem de Anime</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Roboto:ital,wdth,wght@0,75..100,100..900;1,75..100,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <form action="" method="get">
        <h1>Cadastre o seu personagem de anime</h1>
        <div id="inputContainer">
            <label for="inputName">Nome do Personagem:</label>
            <input type="text" name="characterName" id="inputName">
            <label for="inputAge">Idade do Personagem</label>
            <input type="number" name="characterAge" id="inputAge">
            <label>História do Personagem</label>
            <textarea name="characterHistory" id="textHistory"></textarea>
            <label>Personalidade do Personagem</label>
            <textarea name="characterPersonality" id="textPersonality"></textarea>
        </div>
        <input type="submit" value="Cadastrar" id="submitButton">
    </form>
</body>

</html>
