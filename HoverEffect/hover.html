<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Hover Effect</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            align-content: center;
            width: 100vw;
            height: 100vh;
        }
        div.box{
            width: 500px;
            height: 500px;
            background-color: rgb(0, 191, 255);
            border-radius: 20px;
            transition: all 0.2s ease;
            box-shadow: 6px 6px 6px 7px rgba(0, 0, 0, 0.486);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            align-content: center;
        }
        div.box:hover{
            transform: scale(1.15);
            box-shadow: 10px 10px 10px 5px rgba(0, 0, 0, 0.548);
        }
        p{
            font-family: helvetica;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="box">
        <p>Hover me!</p>
    </div>
</body>
</html>
